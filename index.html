<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Pro - BO3 & Diff</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1021/1021201.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1021/1021201.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --card: #1e293b;
            --text: #f8fafc; --win: #22c55e; --lose: #ef4444; --accent: #38bdf8;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 40px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        .hidden { display: none; }
        
        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--accent); }

        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }

        .match-card { border-bottom: 1px solid #334155; padding: 15px 0; }
        .match-card:last-child { border: none; }
        .match-names { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        
        .score-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .score-btn { 
            background: #334155; color: #94a3b8; border: 1px solid #475569; 
            padding: 10px 2px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer;
        }
        .score-btn.active { background: var(--primary); color: white; border-color: var(--accent); }
        .score-btn.active.is-win { background: var(--win); border-color: #4ade80; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; padding-bottom: 8px; }
        td { padding: 12px 4px; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .pts-col { font-weight: bold; color: var(--win); text-align: right; font-size: 1.1rem; }
        .diff-col { font-weight: bold; color: var(--accent); text-align: center; }

        button.main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        button.sec { background: #334155; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        button:disabled { opacity: 0.2; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🤖 Tournament Pro BO3</h1>

    <div id="sec-home">
        <div class="card">
            <h2>Choisir une Poule (8 joueurs)</h2>
            <div class="grid-menu">
                <button class="main" onclick="openLeague('Poule_A')">🅰 Poule A</button>
                <button class="main" onclick="openLeague('Poule_B')">🅱 Poule B</button>
                <button class="main" onclick="openLeague('Poule_C')">🅲 Poule C</button>
                <button class="main" onclick="openLeague('Poule_D')">🅳 Poule D</button>
            </div>
        </div>

        <div class="card" style="opacity:0.8">
            <h3 style="margin-top:0; font-size: 0.9rem;">Sauvegarde & Transfert</h3>
            <div style="display:flex; gap:10px">
                <button class="sec" style="flex:1" onclick="exportJSON()">💾 Export</button>
                <button class="sec" style="flex:1" onclick="document.getElementById('fileIn').click()">📂 Import</button>
            </div>
            <input type="file" id="fileIn" class="hidden" onchange="importJSON(event)">
        </div>
        <button class="sec" style="width:100%; color:var(--lose); margin-top:5px;" onclick="fullReset()">⚠️ Reset Global</button>
    </div>

    <div id="sec-setup" class="hidden">
        <button class="sec" onclick="nav('sec-home')">⬅ Menu</button>
        <div class="card" style="margin-top:15px">
            <h2 id="setup-title">Noms des 8 Joueurs</h2>
            <div class="player-grid" id="inputs-container"></div>
            <button class="main" style="margin-top:20px" onclick="startLeague()">GÉNÉRER LE TOURNOI</button>
        </div>
    </div>

    <div id="sec-tournament" class="hidden">
        <button class="sec" onclick="nav('sec-home')">⬅ Accueil</button>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0;">
            <button class="sec" id="prev-btn" onclick="moveWave(-1)">◀</button>
            <div style="text-align:center">
                <div id="wave-label" style="font-weight:bold; font-size:1.1rem">Vague 1 / 7</div>
                <div id="league-label" style="font-size:0.7rem; color:var(--accent); font-weight:bold; text-transform:uppercase;">POULE</div>
            </div>
            <button class="sec" id="next-btn" onclick="moveWave(1)">▶</button>
        </div>

        <div class="card">
            <div id="matches-list"></div>
        </div>

        <div class="card">
            <h2>Classement détaillé</h2>
            <table>
                <thead>
                    <tr><th>JOUEUR</th><th style="text-align:center">W/L</th><th style="text-align:center">DIFF</th><th style="text-align:right">PTS</th></tr>
                </thead>
                <tbody id="leaderboard"></tbody>
            </table>
        </div>
    </div>

<script>
    let db = {
        Poule_A: { started: false, players: [], schedule: [], currentWave: 0 },
        Poule_B: { started: false, players: [], schedule: [], currentWave: 0 },
        Poule_C: { started: false, players: [], schedule: [], currentWave: 0 },
        Poule_D: { started: false, players: [], schedule: [], currentWave: 0 }
    };
    let activeLeague = null;

    function load() {
        const saved = localStorage.getItem('bot_bo3_diff_v4');
        if(saved) db = JSON.parse(saved);
        nav('sec-home');
    }

    function save() { localStorage.setItem('bot_bo3_diff_v4', JSON.stringify(db)); }

    function openLeague(id) {
        activeLeague = id;
        if(!db[id].started) { setupLeagueInputs(); nav('sec-setup'); } 
        else { renderTournament(); nav('sec-tournament'); }
    }

    function setupLeagueInputs() {
        const cont = document.getElementById('inputs-container');
        cont.innerHTML = "";
        for(let i=1; i<=8; i++) {
            cont.innerHTML += `<input type="text" id="bot-${i}" value="Joueur_${i}" placeholder="Nom ${i}">`;
        }
    }

    function startLeague() {
        let players = [];
        for(let i=1; i<=8; i++) {
            const el = document.getElementById('bot-' + i);
            if(el) players.push({ id: i, name: el.value, matchWins: 0, matchLoses: 0, points: 0, diff: 0 });
        }
        db[activeLeague].players = players;
        db[activeLeague].schedule = generateBergerSchedule(players.map(p => p.id));
        db[activeLeague].started = true;
        save(); renderTournament(); nav('sec-tournament');
    }

    function generateBergerSchedule(ids) {
        let sched = [];
        let tempIds = [...ids];
        const n = tempIds.length;
        for(let r=0; r<n-1; r++) {
            let wave = [];
            for(let i=0; i<n/2; i++) {
                wave.push({ p1: tempIds[i], p2: tempIds[n-1-i], score: null });
            }
            sched.push(wave);
            tempIds.splice(1, 0, tempIds.pop());
        }
        return sched;
    }

    function setScore(matchIdx, scoreVal) {
        let leg = db[activeLeague];
        let match = leg.schedule[leg.currentWave][matchIdx];
        match.score = (match.score === scoreVal) ? null : scoreVal;
        save(); renderTournament();
    }

    function renderTournament() {
        let leg = db[activeLeague];
        document.getElementById('league-label').innerText = activeLeague.replace('_', ' ');
        document.getElementById('wave-label').innerText = `Vague ${leg.currentWave + 1} / 7`;
        
        const mList = document.getElementById('matches-list');
        mList.innerHTML = "";
        let waveCompleted = true;

        leg.schedule[leg.currentWave].forEach((m, idx) => {
            const bot1 = leg.players.find(p => p.id === m.p1);
            const bot2 = leg.players.find(p => p.id === m.p2);
            if(!m.score) waveCompleted = false;

            mList.innerHTML += `
                <div class="match-card">
                    <div class="match-names">
                        <span>${bot1.name}</span>
                        <span style="color:var(--accent)">VS</span>
                        <span>${bot2.name}</span>
                    </div>
                    <div class="score-selector">
                        <button class="score-btn ${m.score==='2-0'?'active is-win':''}" onclick="setScore(${idx}, '2-0')">2 - 0</button>
                        <button class="score-btn ${m.score==='2-1'?'active is-win':''}" onclick="setScore(${idx}, '2-1')">2 - 1</button>
                        <button class="score-btn ${m.score==='1-2'?'active':''}" onclick="setScore(${idx}, '1-2')">1 - 2</button>
                        <button class="score-btn ${m.score==='0-2'?'active':''}" onclick="setScore(${idx}, '0-2')">0 - 2</button>
                    </div>
                </div>`;
        });

        document.getElementById('prev-btn').disabled = (leg.currentWave === 0);
        document.getElementById('next-btn').disabled = !waveCompleted || (leg.currentWave === 6);

        calculateLeaderboard();
    }

    function calculateLeaderboard() {
        let leg = db[activeLeague];
        leg.players.forEach(p => { p.matchWins = 0; p.matchLoses = 0; p.points = 0; p.diff = 0; });

        leg.schedule.forEach(wave => {
            wave.forEach(m => {
                if(!m.score) return;
                const b1 = leg.players.find(p => p.id === m.p1);
                const b2 = leg.players.find(p => p.id === m.p2);
                
                if(m.score === "2-0") { 
                    b1.points += 3; b1.diff += 2; b1.matchWins++;
                    b2.points += 0; b2.diff -= 2; b2.matchLoses++;
                }
                else if(m.score === "2-1") { 
                    b1.points += 2; b1.diff += 1; b1.matchWins++;
                    b2.points += 1; b2.diff -= 1; b2.matchLoses++;
                }
                else if(m.score === "1-2") { 
                    b1.points += 1; b1.diff -= 1; b1.matchLoses++;
                    b2.points += 2; b2.diff += 1; b2.matchWins++;
                }
                else if(m.score === "0-2") { 
                    b1.points += 0; b1.diff -= 2; b1.matchLoses++;
                    b2.points += 3; b2.diff += 2; b2.matchWins++;
                }
            });
        });

        // TRI : Points > Diff > Victoires
        const sorted = [...leg.players].sort((a,b) => {
            if(b.points !== a.points) return b.points - a.points;
            if(b.diff !== a.diff) return b.diff - a.diff;
            return b.matchWins - a.matchWins;
        });

        document.getElementById('leaderboard').innerHTML = sorted.map(p => `
            <tr>
                <td><b>${p.name}</b></td>
                <td style="text-align:center; color:#94a3b8">${p.matchWins}W-${p.matchLoses}L</td>
                <td class="diff-col">${p.diff > 0 ? '+' + p.diff : p.diff}</td>
                <td class="pts-col">${p.points}</td>
            </tr>`).join('');
    }

    function moveWave(dir) {
        db[activeLeague].currentWave += dir;
        save(); renderTournament();
    }

    function nav(id) {
        document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `tournoi_bo3_diff_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            db = JSON.parse(event.target.result);
            save(); load(); alert("Données chargées !");
        };
        reader.readAsText(e.target.files[0]);
    }

    function fullReset() {
        if(confirm("Attention : supprimer TOUTES les poules et tous les scores ?")) {
            localStorage.removeItem('bot_bo3_diff_v4');
            location.reload();
        }
    }

    load();
</script>
</body>
</html>
